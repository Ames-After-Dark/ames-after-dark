name: Release Development to Production

# Manual trigger
on:
  workflow_dispatch:

jobs:
  merge_and_deploy:
    runs-on: [self-hosted]
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: development   # start from development branch
          
      - name: Merge development into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin development
          git checkout main
          git merge origin/development --no-ff -m "Automated merge from development to main"
          git push https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }} main

      - name: Deploy to production
        run: |
          echo "$EC2_KEY" > ec2_key.pem
          chmod 600 ec2_key.pem
          ssh -i ec2_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST 'bash /home/ubuntu/deploy_prod.sh'
          rm -f ec2_key.pem
