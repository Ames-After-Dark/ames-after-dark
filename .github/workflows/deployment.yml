name: deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - run: pm2 stop ames-after-dark && rsync -av --delete backend /home/aad_admin/deployment/ && cd /home/aad_admin/deployment/backend && npm ci && pm2 restart ames-after-dark