name: Enforce Workflow

on:
  pull_request:
    branches: [ main ]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR comes from development
        run: |
          if [[ "${{ github.head_ref }}" != "development" ]]; then
            echo "Production is protected."
            echo "You are trying to merge from: ${{ github.head_ref }}"
            echo "You can ONLY merge into main from the 'development' branch."
            exit 1
          fi
          echo "Branch check passed. Safe to merge."